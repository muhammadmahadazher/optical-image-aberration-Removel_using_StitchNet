name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-core:
    name: Python core (${{ matrix.os }}, ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.12"
          - os: windows-latest
            python: "3.12"
          - os: macos-latest
            python: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install core and test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Test stitching, API, and archive safety
        run: python -m pytest --ignore=tests/test_ml.py

  python-quality:
    name: Python quality and ML safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install ML and development dependencies
        run: python -m pip install -e ".[ml,dev]"
      - name: Lint maintained application surfaces
        run: python -m ruff check src backend tests training evaluation scripts start.py
      - name: Test learned-model safety gates
        run: python -m pytest tests/test_ml.py

  frontend:
    name: Frontend production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Typecheck, build, and test artifact
        run: npm test
