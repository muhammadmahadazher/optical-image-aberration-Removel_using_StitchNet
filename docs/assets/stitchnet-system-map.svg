<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="620" viewBox="0 0 1440 620" role="img" aria-labelledby="title desc">
  <title id="title">StitchNet Laboratory system map</title>
  <desc id="desc">Microscopy tiles pass through secure validation, overlap registration, optional gated RAFT refinement, robust global optimization, exposure balancing, blending, and auditable artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081326"/>
      <stop offset="0.55" stop-color="#101C38"/>
      <stop offset="1" stop-color="#071923"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7189FF"/>
      <stop offset="1" stop-color="#496CF2"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#42D3AB"/>
      <stop offset="1" stop-color="#1E9B79"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000814" flood-opacity=".42"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <style>
      .eyebrow{font:700 16px Inter,Segoe UI,Arial,sans-serif;letter-spacing:2.4px;fill:#89A0C8}
      .heading{font:700 34px Inter,Segoe UI,Arial,sans-serif;fill:#F7FAFF}
      .card-title{font:700 21px Inter,Segoe UI,Arial,sans-serif;fill:#F8FBFF}
      .card-body{font:400 15px Inter,Segoe UI,Arial,sans-serif;fill:#AFC0DA}
      .step{font:700 14px Inter,Segoe UI,Arial,sans-serif;fill:#D8E4FF}
      .pill{font:700 14px Inter,Segoe UI,Arial,sans-serif;fill:#DDFBF1}
      .artifact{font:600 16px Inter,Segoe UI,Arial,sans-serif;fill:#E8F0FF}
    </style>
  </defs>
  <rect width="1440" height="620" rx="34" fill="url(#bg)"/>
  <circle cx="1240" cy="80" r="150" fill="#496CF2" opacity=".18" filter="url(#glow)"/>
  <circle cx="210" cy="560" r="150" fill="#1E9B79" opacity=".16" filter="url(#glow)"/>
  <text x="66" y="64" class="eyebrow">FROM FIELDS TO EVIDENCE</text>
  <text x="66" y="108" class="heading">One constrained reconstruction pipeline</text>

  <g filter="url(#shadow)">
    <g transform="translate(60 174)">
      <rect width="210" height="178" rx="24" fill="#152541" stroke="#2D4267"/>
      <rect x="22" y="22" width="42" height="28" rx="8" fill="url(#blue)"/>
      <rect x="38" y="38" width="42" height="28" rx="8" fill="#91A5FF" opacity=".7"/>
      <text x="22" y="94" class="step">01 · INPUT</text>
      <text x="22" y="124" class="card-title">Microscopy tiles</text>
      <text x="22" y="150" class="card-body">PNG · TIFF · JPEG · BMP</text>
    </g>

    <g transform="translate(300 174)">
      <rect width="210" height="178" rx="24" fill="#152541" stroke="#2D4267"/>
      <path d="M28 30l18-8 18 8v15c0 13-8 22-18 27-10-5-18-14-18-27z" fill="#42D3AB" opacity=".9"/>
      <path d="M38 45l6 6 11-14" fill="none" stroke="#071923" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="22" y="94" class="step">02 · TRUST BOUNDARY</text>
      <text x="22" y="124" class="card-title">Validate + decode</text>
      <text x="22" y="150" class="card-body">Safe archives · dimensions</text>
    </g>

    <g transform="translate(540 174)">
      <rect width="240" height="178" rx="24" fill="#182B4B" stroke="#496CF2" stroke-width="2"/>
      <circle cx="38" cy="42" r="17" fill="none" stroke="#7189FF" stroke-width="4"/>
      <circle cx="68" cy="42" r="17" fill="none" stroke="#42D3AB" stroke-width="4"/>
      <path d="M45 42h16" stroke="#F7FAFF" stroke-width="3" stroke-linecap="round"/>
      <text x="22" y="94" class="step">03 · LOCAL EVIDENCE</text>
      <text x="22" y="124" class="card-title">Register overlaps</text>
      <text x="22" y="150" class="card-body">SIFT · correlation · priors</text>
    </g>

    <g transform="translate(810 174)">
      <rect width="240" height="178" rx="24" fill="#182B4B" stroke="#496CF2" stroke-width="2"/>
      <circle cx="35" cy="32" r="8" fill="#7189FF"/><circle cx="68" cy="32" r="8" fill="#42D3AB"/>
      <circle cx="51" cy="62" r="8" fill="#F2B766"/>
      <path d="M41 37l7 17M62 38L55 55M43 32h17" stroke="#C6D5F0" stroke-width="3"/>
      <text x="22" y="94" class="step">04 · GLOBAL CONSENSUS</text>
      <text x="22" y="124" class="card-title">Optimize the graph</text>
      <text x="22" y="150" class="card-body">Robust loss · edge rejection</text>
    </g>

    <g transform="translate(1080 174)">
      <rect width="300" height="178" rx="24" fill="#143044" stroke="#1E9B79" stroke-width="2"/>
      <path d="M22 28h56v42H22z" fill="url(#mint)" opacity=".92"/>
      <path d="M30 60l13-13 10 9 17-19" fill="none" stroke="#F7FAFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="22" y="94" class="step">05 · RECONSTRUCTION</text>
      <text x="22" y="124" class="card-title">Balance + blend</text>
      <text x="22" y="150" class="card-body">Gain/bias · coverage feathers</text>
    </g>
  </g>

  <g fill="none" stroke="#7690BC" stroke-width="3" stroke-linecap="round">
    <path d="M272 263h25"/><path d="M512 263h25"/><path d="M782 263h25"/><path d="M1052 263h25"/>
  </g>
  <g fill="#7690BC">
    <path d="M297 263l-9-6v12z"/><path d="M537 263l-9-6v12z"/><path d="M807 263l-9-6v12z"/><path d="M1077 263l-9-6v12z"/>
  </g>

  <g transform="translate(594 378)">
    <rect width="292" height="54" rx="27" fill="#173C3B" stroke="#2CB98F"/>
    <circle cx="31" cy="27" r="13" fill="#42D3AB"/>
    <path d="M25 27l5 5 8-10" fill="none" stroke="#09201C" stroke-width="3" stroke-linecap="round"/>
    <text x="54" y="33" class="pill">Optional photometry-gated RAFT</text>
  </g>
  <path d="M660 352v26M824 378v-26" fill="none" stroke="#42D3AB" stroke-width="2.5" stroke-dasharray="6 7"/>

  <g transform="translate(150 486)">
    <text x="0" y="30" class="eyebrow">AUDITABLE OUTPUT</text>
    <g transform="translate(214 0)">
      <rect width="210" height="54" rx="17" fill="#132844" stroke="#2D4267"/>
      <text x="28" y="34" class="artifact">▣  Full mosaic</text>
    </g>
    <g transform="translate(446 0)">
      <rect width="210" height="54" rx="17" fill="#132844" stroke="#2D4267"/>
      <text x="28" y="34" class="artifact">◩  Coverage mask</text>
    </g>
    <g transform="translate(678 0)">
      <rect width="210" height="54" rx="17" fill="#132844" stroke="#2D4267"/>
      <text x="28" y="34" class="artifact">◫  Preview</text>
    </g>
    <g transform="translate(910 0)">
      <rect width="230" height="54" rx="17" fill="#143044" stroke="#1E9B79"/>
      <text x="28" y="34" class="artifact">{ }  Quality report</text>
    </g>
  </g>
</svg>
